name: Populate skills
on:
  push:
    branches: [main]
jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Copy skills
        run: |
          git clone --depth=1 https://github.com/nicolasaudran/eukles-kpi-commerce.git /tmp/eukles
          mkdir -p skills .claude/hooks
          cp -r /tmp/eukles/.claude/skills/* skills/
          cp /tmp/eukles/.claude/hooks/session-start.sh .claude/hooks/
          cp /tmp/eukles/.claude/settings.json .claude/settings.json
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Add Superpowers skills"
          git push
